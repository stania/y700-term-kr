<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- 심볼/이모지 폴백: 각 제네릭 패밀리 뒤에 추가 -->
  <alias>
    <family>sans-serif</family>
    <accept>
      <family>Noto Sans Symbols 2</family>
      <family>Noto Color Emoji</family>
    </accept>
  </alias>
  <alias>
    <family>serif</family>
    <accept>
      <family>Noto Sans Symbols 2</family>
      <family>Noto Color Emoji</family>
    </accept>
  </alias>
  <alias>
    <family>monospace</family>
    <accept>
      <family>Noto Sans Symbols 2</family>
      <family>Noto Color Emoji</family>
    </accept>
  </alias>

  <!-- emoji 요청 시 Noto Color Emoji 우선 -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
    <accept>
      <family>Noto Sans Symbols 2</family>
    </accept>
  </alias>
</fontconfig>
