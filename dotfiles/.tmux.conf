set-option -g prefix C-a
bind-key C-a last-window
bind-key a send-prefix
bind-key C-c new-window
bind-key C-w choose-tree -Zw

bind-key C-s set-window-option synchronize-panes

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R
bind tab last-pane

set -g pane-base-index 1
set -g base-index 1

# Alt+숫자 직접 이동
bind-key -n M-1 select-pane -t 1
bind-key -n M-2 select-pane -t 2
bind-key -n M-3 select-pane -t 3
bind-key -n M-4 select-pane -t 4
bind-key -n M-5 select-pane -t 5
bind-key -n M-6 select-pane -t 6
bind-key -n M-7 select-pane -t 7
bind-key -n M-8 select-pane -t 8
bind-key -n M-9 select-pane -t 9

# Alt+hjkl vim 스타일 이동
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R
bind-key -n M-q display-panes

bind-key C command-prompt -p "Name of new window: " "new-window -n '%%'"

# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

set-window-option -g automatic-rename off
set-option -g allow-rename off

set -g set-titles on
set -g set-titles-string "[#h] #T"

set -g mouse on

# true color + extended keys + OSC 52 clipboard
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g set-clipboard on
set -as terminal-features ',xterm*:clipboard'

set -g status on

set-window-option -g mode-keys vi

# clipboard (X11: xclip + Android sync, Wayland: wl-copy)
bind-key -T copy-mode-vi v             send-keys -X begin-selection
bind-key -T copy-mode-vi y             send-keys -X copy-pipe-and-cancel 'tmux-clipboard'
bind-key -T copy-mode-vi Enter         send-keys -X copy-pipe-and-cancel 'tmux-clipboard'
bind-key -T copy-mode-vi MouseDragEnd1Pane  send-keys -X copy-pipe-and-cancel 'tmux-clipboard'
bind-key -T copy-mode-vi DoubleClick1Pane   select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel 'tmux-clipboard'
bind-key -T copy-mode-vi TripleClick1Pane   select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel 'tmux-clipboard'

set-option -g update-environment 'PATH'
set-option -ga update-environment 'SSH_AUTH_SOCK'
set-option -ga update-environment 'DISPLAY'
set-option -ga update-environment 'WAYLAND_DISPLAY'
set-option -ga update-environment 'XDG_RUNTIME_DIR'

set-option -g history-limit 10000

set-option -ga terminal-overrides ',*:enacs@:smacs@:rmacs@:acsc@'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'nordtheme/tmux'

run '~/.tmux/plugins/tpm/tpm'
